version: "3.9"

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      ENDEE_HOST: http://endee:8080
      ENDEE_TOKEN: ""
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

volumes:
  endee-data:
